<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <defs>
    <linearGradient id="eobomBg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4C8C7A"/>
      <stop offset="1" stop-color="#2C5C50"/>
    </linearGradient>
    <linearGradient id="eobomShine" x1="0" y1="0" x2="0" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- hide the right ring where the left ring crosses over it (top weave) -->
    <mask id="eobomWeave">
      <rect width="192" height="192" fill="white"/>
      <circle cx="80" cy="80" r="30" fill="none" stroke="black" stroke-width="20"/>
    </mask>
  </defs>
  <rect width="192" height="192" rx="44" fill="url(#eobomBg)"/>
  <rect width="192" height="192" rx="44" fill="url(#eobomShine)"/>
  <g fill="none" stroke="#ffffff" stroke-width="13">
    <circle cx="113" cy="100" r="30" mask="url(#eobomWeave)"/>
    <circle cx="80" cy="92" r="30"/>
  </g>
</svg>
